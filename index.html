<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shifts">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect x='6' y='14' width='52' height='46' rx='12' fill='%23FF3B30'/><line x1='22' y1='7' x2='22' y2='19' stroke='%23fff' stroke-width='5' stroke-linecap='round'/><line x1='42' y1='7' x2='42' y2='19' stroke='%23fff' stroke-width='5' stroke-linecap='round'/><line x1='6' y1='30' x2='58' y2='30' stroke='%23fff' stroke-width='3' opacity='0.85'/><g fill='%23fff'><circle cx='19' cy='40' r='3.2'/><circle cx='32' cy='40' r='3.2'/><circle cx='45' cy='40' r='3.2'/><circle cx='19' cy='51' r='3.2'/><circle cx='32' cy='51' r='3.2'/><circle cx='45' cy='51' r='3.2'/></g></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect x='6' y='14' width='52' height='46' rx='12' fill='%23FF3B30'/><line x1='22' y1='7' x2='22' y2='19' stroke='%23fff' stroke-width='5' stroke-linecap='round'/><line x1='42' y1='7' x2='42' y2='19' stroke='%23fff' stroke-width='5' stroke-linecap='round'/><line x1='6' y1='30' x2='58' y2='30' stroke='%23fff' stroke-width='3' opacity='0.85'/><g fill='%23fff'><circle cx='19' cy='40' r='3.2'/><circle cx='32' cy='40' r='3.2'/><circle cx='45' cy='40' r='3.2'/><circle cx='19' cy='51' r='3.2'/><circle cx='32' cy='51' r='3.2'/><circle cx='45' cy='51' r='3.2'/></g></svg>">
<title>Shift Calendar</title>
<style>
  :root{
    --text:#000; --muted:#9a9aa0; --accent:#FF3B30; --on-accent:#fff;
    --line:rgba(60,60,67,0.13); --border:rgba(60,60,67,0.18);
    --bg:#ffffff;
    --glass:rgba(255,255,255,0.72); --glass-strong:rgba(255,255,255,0.82);
    --glass-stroke:rgba(255,255,255,0.7); --glass-hl:inset 0 1px 0 rgba(255,255,255,0.8);
    --seg-bg:rgba(120,120,128,0.16); --seg-on:#ffffff;
    --input-bg:rgba(118,118,128,0.10);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --text:#fff; --muted:#8a8a90; --accent:#FF453A;
      --line:rgba(255,255,255,0.12); --border:rgba(255,255,255,0.16);
      --bg:#000000;
      --glass:rgba(28,28,30,0.7); --glass-strong:rgba(36,36,40,0.8);
      --glass-stroke:rgba(255,255,255,0.12); --glass-hl:inset 0 1px 0 rgba(255,255,255,0.12);
      --seg-bg:rgba(120,120,128,0.3); --seg-on:rgba(99,99,102,0.9);
      --input-bg:rgba(118,118,128,0.22);
    }
  }
  *{ box-sizing:border-box; }
  html{ scroll-behavior:auto; }
  html,body{ -webkit-text-size-adjust:100%; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:var(--text); background:var(--bg); touch-action:manipulation; }
  button{ touch-action:manipulation; color:inherit; font-family:inherit; }
  #root{ max-width:560px; margin:0 auto; min-height:100dvh; position:relative; background:var(--bg); }

  .hdr{ position:sticky; top:0; z-index:10; background:var(--glass); backdrop-filter:blur(22px) saturate(180%); -webkit-backdrop-filter:blur(22px) saturate(180%); border-bottom:0.5px solid var(--line); }
  .hrow{ display:flex; align-items:center; justify-content:space-between; gap:8px; padding:calc(12px + env(safe-area-inset-top)) 16px 4px; }
  .title{ font-size:25px; font-weight:700; letter-spacing:-0.3px; }
  .title .yr{ color:var(--accent); }
  .icons{ display:flex; align-items:center; gap:4px; }
  .ico{ background:none; border:none; padding:7px; cursor:pointer; display:flex; align-items:center; color:var(--accent); border-radius:50%; }
  .txt-btn{ font-size:15px; color:var(--accent); background:none; border:none; font-weight:600; cursor:pointer; padding:6px 4px; }
  .seg{ display:flex; gap:2px; background:var(--seg-bg); border-radius:14px; padding:3px; margin:8px 16px; }
  .seg button{ flex:1; border:none; background:none; padding:7px 0; font-size:13px; font-weight:600; border-radius:11px; cursor:pointer; color:var(--text); transition:background .18s; }
  .seg button.on{ background:var(--seg-on); box-shadow:0 1px 4px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.5); }
  .subnav{ display:flex; align-items:center; padding:0 12px 6px; }
  .subnav .sp{ flex:1; }
  .wk{ display:grid; grid-template-columns:repeat(7,1fr); padding:2px 0 6px; }
  .wk div{ text-align:center; font-size:12px; color:var(--muted); font-weight:600; }

  /* Continuous month */
  .mcont{ padding-bottom:calc(120px + env(safe-area-inset-bottom)); }
  .msection{ scroll-margin-top:6px; }
  .mlabel{ font-size:21px; font-weight:700; letter-spacing:-0.3px; padding:18px 14px 2px; }
  .mlabel .yr{ color:var(--muted); font-weight:600; }
  .mweeks{ display:grid; grid-template-columns:repeat(7,1fr); }
  .mcell{ min-height:92px; border:none; background:none; padding:5px 2px 4px; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; border-top:0.5px solid var(--line); overflow:hidden; }
  .mcell.empty{ cursor:default; }
  .mcell.sel{ background:rgba(255,59,48,0.14); }
  .mnum{ width:27px; height:27px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; color:var(--text); flex:0 0 auto; }
  .mcell.we .mnum{ color:var(--muted); }
  .mnum.today{ background:var(--accent); color:#fff; font-weight:700; box-shadow:0 2px 8px rgba(255,59,48,0.4); }
  .mevs{ width:100%; display:flex; flex-direction:column; gap:2px; padding:0 2px; }
  .mpill{ font-size:9px; font-weight:600; color:#fff; border-radius:4px; padding:1px 4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; line-height:1.35; }
  .mmore{ font-size:9px; color:var(--muted); padding-left:4px; }

  /* Year */
  .yeargrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:6px; padding:8px 10px calc(120px + env(safe-area-inset-bottom)); }
  .mini{ padding:8px 5px; border-radius:16px; cursor:pointer; }
  .mini h4{ margin:0 0 5px 4px; font-size:14px; font-weight:700; }
  .mini h4.cur{ color:var(--accent); }
  .minigrid{ display:grid; grid-template-columns:repeat(7,1fr); gap:1px; }
  .minigrid span{ font-size:9px; text-align:center; line-height:13px; color:var(--text); }
  .minigrid span.t{ background:var(--accent); color:#fff; border-radius:50%; }

  /* Timeline */
  .tlhead{ display:flex; padding:2px 0; border-bottom:0.5px solid var(--line); }
  .tlgutter{ width:48px; flex:0 0 48px; }
  .tlhcell{ flex:1; text-align:center; padding:3px 0; }
  .tlhcell .dn{ font-size:11px; color:var(--muted); font-weight:600; }
  .tlhcell .dd{ width:32px; height:32px; margin:1px auto 0; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; cursor:pointer; }
  .tlhcell .dd.today{ background:var(--accent); color:#fff; font-weight:700; box-shadow:0 2px 8px rgba(255,59,48,0.4); }
  .tlallday{ display:flex; border-bottom:0.5px solid var(--line); min-height:22px; }
  .tladcell{ flex:1; padding:2px; display:flex; flex-direction:column; gap:2px; border-left:0.5px solid var(--line); }
  .adbar{ font-size:9px; font-weight:700; color:#fff; border-radius:5px; padding:1px 5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; }
  .tlscroll{ overflow-y:auto; max-height:calc(100dvh - 250px - env(safe-area-inset-top)); -webkit-overflow-scrolling:touch; padding-bottom:calc(40px + env(safe-area-inset-bottom)); }
  .tlinner{ position:relative; }
  .hourlabel{ position:absolute; left:0; width:44px; text-align:right; font-size:10px; color:var(--muted); transform:translateY(-6px); }
  .hourline{ position:absolute; left:48px; right:0; border-top:0.5px solid var(--line); }
  .tlcol{ position:absolute; top:0; border-left:0.5px solid var(--line); }
  .block{ position:absolute; border-radius:8px; padding:3px 5px; overflow:hidden; color:#fff; font-size:11px; line-height:1.15; cursor:pointer; box-shadow:inset 0 1px 0 rgba(255,255,255,0.25); }
  .block b{ font-weight:600; }
  .nowline{ position:absolute; left:0; right:0; height:2px; background:var(--accent); z-index:5; }
  .nowdot{ position:absolute; left:-4px; top:-3px; width:9px; height:9px; border-radius:50%; background:var(--accent); }

  .fab{ position:fixed; bottom:calc(26px + env(safe-area-inset-bottom)); right:calc(50% - 280px + 24px); width:58px; height:58px; border-radius:50%; background:linear-gradient(160deg,#ff5a52,var(--accent)); border:none; color:#fff; cursor:pointer; line-height:0; display:flex; align-items:center; justify-content:center; z-index:30; box-shadow:0 10px 26px rgba(255,59,48,0.45), inset 0 1px 0 rgba(255,255,255,0.5); }
  .fab svg{ display:block; }
  @media (max-width:560px){ .fab{ right:24px; } }
  .actionbar{ position:fixed; left:0; right:0; bottom:0; max-width:560px; margin:0 auto; background:var(--glass-strong); backdrop-filter:blur(24px) saturate(180%); -webkit-backdrop-filter:blur(24px) saturate(180%); border-top:0.5px solid var(--line); padding:12px 16px calc(12px + env(safe-area-inset-bottom)); display:flex; gap:10px; align-items:center; z-index:40; }
  .actionbar .count{ font-weight:600; flex:1; }

  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.32); backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px); z-index:50; display:flex; align-items:flex-end; justify-content:center; }
  .sheet{ background:var(--glass-strong); backdrop-filter:blur(30px) saturate(180%); -webkit-backdrop-filter:blur(30px) saturate(180%); width:100%; max-width:560px; border-radius:26px 26px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom)); max-height:90dvh; overflow-y:auto; animation:up .26s cubic-bezier(.22,.9,.3,1); border-top:0.5px solid var(--glass-stroke); box-shadow:0 -10px 40px rgba(0,0,0,0.18), var(--glass-hl); }
  @keyframes up{ from{ transform:translateY(60px); opacity:.4 } to{ transform:none; opacity:1 } }
  .grab{ width:38px; height:5px; border-radius:3px; background:var(--border); margin:-6px auto 12px; }
  .shead{ display:flex; align-items:center; margin-bottom:16px; }
  .shead .st{ font-size:20px; font-weight:700; flex:1; letter-spacing:-0.2px; }
  .label{ font-size:13px; color:var(--muted); font-weight:600; margin-bottom:8px; }
  input[type=text],input[type=time],input[type=date],textarea{ width:100%; padding:12px; font-size:16px; border:0.5px solid var(--border); border-radius:12px; margin-bottom:12px; outline:none; background:var(--input-bg); color:var(--text); }
  textarea{ min-height:70px; resize:vertical; font-family:inherit; }
  .toggle{ display:flex; align-items:center; justify-content:space-between; padding:10px 0 14px; }
  .sw{ width:50px; height:30px; border-radius:15px; background:var(--seg-bg); position:relative; cursor:pointer; transition:background .18s; }
  .sw.on{ background:#34C759; }
  .sw::after{ content:""; position:absolute; top:2px; left:2px; width:26px; height:26px; border-radius:50%; background:#fff; transition:left .18s; box-shadow:0 1px 4px rgba(0,0,0,0.35); }
  .sw.on::after{ left:22px; }
  .ev{ display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:0.5px solid var(--border); cursor:pointer; }
  .ev .bar{ width:4px; height:38px; border-radius:2px; }
  .ev .et{ flex:1; } .ev .et b{ font-weight:500; } .ev .et span{ font-size:13px; color:var(--muted); display:block; }
  .btn{ border:none; border-radius:14px; padding:14px; font-size:16px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }
  .primary{ background:linear-gradient(160deg,#ff5a52,var(--accent)); color:#fff; flex:1; box-shadow:0 4px 14px rgba(255,59,48,0.35), inset 0 1px 0 rgba(255,255,255,0.4); }
  .secondary{ background:var(--input-bg); color:var(--accent); flex:1; border:0.5px solid var(--border); }
  .danger{ background:var(--input-bg); color:var(--accent); width:100%; margin-top:10px; border:0.5px solid var(--border); }
  .row{ width:100%; text-align:left; display:flex; align-items:center; gap:10px; background:none; border:none; border-bottom:0.5px solid var(--border); padding:13px 0; font-size:16px; cursor:pointer; color:var(--text); }
  .swatch{ display:flex; gap:10px; margin:4px 0 18px; flex-wrap:wrap; }
  .swatch button{ width:32px; height:32px; border-radius:50%; border:3px solid transparent; cursor:pointer; }
  .shiftbanner{ display:flex; align-items:center; gap:8px; padding:11px 13px; border-radius:14px; margin-bottom:14px; }
  .stype{ padding:10px; margin-bottom:8px; border-radius:14px; background:var(--input-bg); border:0.5px solid var(--border); }
  .stype .r1{ display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .stype .r2{ display:flex; align-items:center; gap:8px; }
  .stype input{ margin:0; }
  .stype input[type=text].nm{ flex:1; padding:7px 9px; }
  .stype input[type=time]{ width:84px; padding:7px 5px; }
  .stype input[type=text].loc{ flex:1; padding:7px 9px; }
  .stype input[type=color]{ width:32px; height:32px; border:none; background:none; padding:0; flex:0 0 32px; }
  .chip{ color:#fff; border-radius:9px; padding:6px 10px; font-size:13px; font-weight:600; }
  .addchip{ background:var(--input-bg); border-radius:9px; padding:6px 11px; font-size:13px; font-weight:600; cursor:pointer; }
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
  "use strict";
  var PALETTE=[["Red","#FF3B30"],["Orange","#FF9500"],["Yellow","#FFCC00"],["Green","#34C759"],["Teal","#30B0C7"],["Blue","#007AFF"],["Indigo","#5856D6"],["Purple","#AF52DE"],["Pink","#FF2D55"]];
  var WEEKDAYS=["M","T","W","T","F","S","S"];
  var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var MON3=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var LEVELS=["year","month","week","day"];
  var HOUR_H=46;

  function pad(n){ return String(n).padStart(2,"0"); }
  function toKey(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function fromKey(s){ var p=s.split("-").map(Number); return new Date(p[0],p[1]-1,p[2]); }
  function daysBetween(a,b){ return Math.round((fromKey(a)-fromKey(b))/86400000); }
  function addDays(d,n){ var x=new Date(d); x.setDate(x.getDate()+n); return x; }
  function colIndex(d){ return (d.getDay()+6)%7; }            // Monday-first column
  function isWeekend(d){ var g=d.getDay(); return g===0||g===6; }
  function weekStart(d){ return addDays(d,-colIndex(d)); }     // Monday
  function wdLabel(d){ return WEEKDAYS[colIndex(d)]; }
  function uid(){ return Math.random().toString(36).slice(2,9); }
  function esc(s){ return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
  function minutesOf(t){ if(!t) return null; var p=t.split(":"); return (+p[0])*60+(+p[1]); }
  function hrLabel(h){ var ap=h<12?"AM":"PM"; var hh=h%12; if(hh===0)hh=12; return hh+" "+ap; }
  function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }

  var mem={};
  function load(){ try{ var v=localStorage.getItem("shift-calendar"); return v?JSON.parse(v):null; }catch(e){ return mem.data||null; } }
  function persist(){ var p=JSON.stringify({events:state.events,shiftTypes:state.shiftTypes,rotation:state.rotation,manual:state.manual}); try{ localStorage.setItem("shift-calendar",p); }catch(e){ mem.data=JSON.parse(p); } }

  var DEFAULT_SHIFTS=[
    {id:"day",name:"Day",color:"#34C759",start:"07:00",end:"19:00",location:""},
    {id:"night",name:"Night",color:"#5856D6",start:"19:00",end:"07:00",location:""},
    {id:"off",name:"Off",color:"#8E8E93",start:"",end:"",location:""}
  ];
  function normEvent(e){ if(e.time&&e.start===undefined)e.start=e.time; if(e.allDay===undefined)e.allDay=false; if(e.start===undefined)e.start=""; if(e.end===undefined)e.end=""; if(e.location===undefined)e.location=""; if(e.notes===undefined)e.notes=""; return e; }
  function normShift(s){ if(s.location===undefined)s.location=""; return s; }

  var saved=load()||{};
  var state={
    view:"month", cursor:new Date(),
    events:(saved.events||[]).map(normEvent),
    shiftTypes:(saved.shiftTypes||DEFAULT_SHIFTS.slice()).map(normShift),
    rotation:saved.rotation||null, manual:saved.manual||{},
    selecting:false, selDays:{}, _g:false, _mscroll:true
  };

  function shiftById(id){ for(var i=0;i<state.shiftTypes.length;i++) if(state.shiftTypes[i].id===id) return state.shiftTypes[i]; return null; }
  function getShift(key){
    if(Object.prototype.hasOwnProperty.call(state.manual,key)) return state.manual[key]===""?null:shiftById(state.manual[key]);
    if(state.rotation&&state.rotation.sequence.length){ var diff=daysBetween(key,state.rotation.startDate); if(diff>=0){ var L=state.rotation.sequence.length; return shiftById(state.rotation.sequence[((diff%L)+L)%L]); } }
    return null;
  }
  function eventsFor(key){ return state.events.filter(function(e){return e.date===key;}); }
  function selCount(){ return Object.keys(state.selDays).length; }

  var root=document.getElementById("root");
  var ICON={
    left:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>',
    right:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>',
    x:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
    brief:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>',
    search:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
    plus:'<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
    pin:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
    rot:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>'
  };

  function contextTitle(){
    var c=state.cursor;
    if(state.view==="year") return '<span class="yr">'+c.getFullYear()+'</span>';
    if(state.view==="month") return MONTHS[c.getMonth()]+' <span class="yr">'+c.getFullYear()+'</span>';
    if(state.view==="week"){ var s=weekStart(c), e=addDays(s,6); var sm=MON3[s.getMonth()], em=MON3[e.getMonth()]; return sm+' '+s.getDate()+' – '+(sm===em?'':em+' ')+e.getDate(); }
    return c.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});
  }
  function updateTitle(){ var t=root.querySelector(".title"); if(t) t.innerHTML=contextTitle(); }

  function render(){
    var keepScroll=(state.view==="month")?window.scrollY:null;
    var rightIcons=state.selecting
      ? '<button class="txt-btn" data-act="cancelSel">Cancel</button>'
      : '<div class="icons"><button class="ico" data-act="search">'+ICON.search+'</button><button class="ico" data-act="work">'+ICON.brief+'</button></div>';
    var seg='<div class="seg">'+LEVELS.map(function(v){ return '<button data-view="'+v+'" class="'+(state.view===v?'on':'')+'">'+v.charAt(0).toUpperCase()+v.slice(1)+'</button>'; }).join("")+'</div>';
    var head='<div class="hdr"><div class="hrow"><div class="title">'+contextTitle()+'</div>'+rightIcons+'</div>'+seg
      +'<div class="subnav"><button class="ico" data-act="prev">'+ICON.left+'</button><button class="ico" data-act="next">'+ICON.right+'</button>'

  function renderMonthCont(){
    var base=new Date(); base=new Date(base.getFullYear(),base.getMonth(),1);
    var h='<div class="mcont">';
    for(var off=-12; off<=24; off++){ var d=new Date(base.getFullYear(),base.getMonth()+off,1); h+=monthSection(d.getFullYear(),d.getMonth()); }
    return h+'</div>';
  }
  function monthSection(y,m){
    var todayKey=toKey(new Date()), curY=new Date().getFullYear();
    var lead=colIndex(new Date(y,m,1)), total=new Date(y,m+1,0).getDate();
    var cells=[],i,d;
    for(i=0;i<lead;i++) cells.push(null);
    for(d=1;d<=total;d++) cells.push(new Date(y,m,d));
    while(cells.length%7!==0) cells.push(null);
    var label=MONTHS[m]+((m===0||y!==curY)?' <span class="yr">'+y+'</span>':'');
    var h='<div class="msection" id="m-'+y+'-'+pad(m+1)+'"><div class="mlabel">'+label+'</div><div class="mweeks">';
    cells.forEach(function(date){
      if(!date){ h+='<div class="mcell empty"></div>'; return; }
      var key=toKey(date), sh=getShift(key), evs=eventsFor(key);
      var we=isWeekend(date)?' we':'', sel=(state.selecting&&state.selDays[key])?' sel':'';
      h+='<button class="mcell'+we+sel+'" data-day="'+key+'"><div class="mnum'+(key===todayKey?' today':'')+'">'+date.getDate()+'</div><div class="mevs">';
      if(sh) h+='<div class="mpill" style="background:'+sh.color+'">'+esc(sh.name)+'</div>';
      evs.slice(0,2).forEach(function(e){ h+='<div class="mpill" style="background:'+e.color+'">'+esc(e.title)+'</div>'; });
      var extra=evs.length-2; if(extra>0) h+='<div class="mmore">+'+extra+' more</div>';
      h+='</div></button>';
    });
    return h+'</div></div>';
  }

  function scrollToMonth(date,smooth){
    var el=document.getElementById('m-'+date.getFullYear()+'-'+pad(date.getMonth()+1)); if(!el) return;
    var hdr=root.querySelector('.hdr'); var hh=hdr?hdr.offsetHeight:0;
    window.scrollTo({ top:Math.max(0, el.offsetTop-hh), behavior:smooth?'smooth':'auto' });
  }

  function renderYear(){
    var y=state.cursor.getFullYear(), now=new Date(), todayKey=toKey(now);
    var h='<div class="yeargrid">';
    for(var m=0;m<12;m++){
      var lead=colIndex(new Date(y,m,1)), total=new Date(y,m+1,0).getDate();
      var cur=(now.getFullYear()===y&&now.getMonth()===m);
      h+='<div class="mini" data-month="'+m+'"><h4 class="'+(cur?'cur':'')+'">'+MON3[m]+'</h4><div class="minigrid">';
      for(var i=0;i<lead;i++) h+='<span></span>';
      for(var d=1;d<=total;d++){ var key=y+"-"+pad(m+1)+"-"+pad(d); h+='<span class="'+(key===todayKey?'t':'')+'">'+d+'</span>'; }
      h+='</div></div>';
    }
    return h+'</div>';
  }

  function weekDays(){ var s=weekStart(state.cursor); var a=[]; for(var i=0;i<7;i++) a.push(toKey(addDays(s,i))); return a; }

  function layoutDay(evs){
    var sorted=evs.slice().sort(function(a,b){ return a.s-b.s||a.e-b.e; });
    var res={}, cluster=[], cEnd=-1;
    function flush(){ var cols=[]; cluster.forEach(function(ev){ var pl=-1; for(var c=0;c<cols.length;c++){ if(cols[c]<=ev.s){ cols[c]=ev.e; pl=c; break; } } if(pl<0){ cols.push(ev.e); pl=cols.length-1; } ev.c=pl; }); var k=cols.length; cluster.forEach(function(ev){ res[ev.id]={left:ev.c*(100/k),width:100/k}; }); cluster=[]; }
    sorted.forEach(function(ev){ if(cluster.length&&ev.s>=cEnd){ flush(); cEnd=-1; } cluster.push(ev); cEnd=Math.max(cEnd,ev.e); });
    if(cluster.length) flush();
    return res;
  }

  function renderTimeline(days){
    var todayKey=toKey(new Date()), now=new Date(), nowMin=now.getHours()*60+now.getMinutes();
    var n=days.length, colW=100/n, totalH=24*HOUR_H;
    var h='<div class="tlhead"><div class="tlgutter"></div>';
    days.forEach(function(key){ var dt=fromKey(key); h+='<div class="tlhcell"><div class="dn">'+wdLabel(dt)+'</div><div class="dd'+(key===todayKey?' today':'')+'" data-day="'+key+'">'+dt.getDate()+'</div></div>'; });
    h+='</div><div class="tlallday"><div class="tlgutter" style="font-size:9px;color:var(--muted);display:flex;align-items:center;justify-content:flex-end;padding-right:5px">all-day</div>';
    days.forEach(function(key){
      var sh=getShift(key); var ad=eventsFor(key).filter(function(e){return e.allDay||!e.start;});
      h+='<div class="tladcell">';
      if(sh){ var loc=(n===1&&sh.location)?' · '+sh.location:''; h+='<div class="adbar" style="background:'+sh.color+'" title="'+esc(sh.name+(sh.location?' — '+sh.location:''))+'">'+esc(sh.name)+(sh.start?' '+sh.start+'–'+sh.end:'')+esc(loc)+'</div>'; }
      ad.forEach(function(e){ h+='<div class="adbar" style="background:'+e.color+'" data-ev="'+e.id+'">'+esc(e.title)+'</div>'; });
      h+='</div>';
    });
    h+='</div><div class="tlscroll" id="tlscroll"><div class="tlinner" style="height:'+totalH+'px">';
    for(var hr=0;hr<24;hr++){ h+='<div class="hourlabel" style="top:'+(hr*HOUR_H)+'px">'+hrLabel(hr)+'</div><div class="hourline" style="top:'+(hr*HOUR_H)+'px"></div>'; }
    h+='<div style="position:absolute;left:48px;right:0;top:0;height:'+totalH+'px">';
    days.forEach(function(key,di){
      var timed=eventsFor(key).filter(function(e){return !e.allDay&&e.start;}).map(function(e){ var s=minutesOf(e.start); var en=minutesOf(e.end); if(en===null||en<=s) en=s+60; if(en>1440)en=1440; return {id:e.id,s:s,e:en,ev:e}; });
      var lay=layoutDay(timed);
      h+='<div class="tlcol" data-colday="'+key+'" style="left:'+(di*colW)+'%;width:'+colW+'%;height:'+totalH+'px">';
      timed.forEach(function(t){
        var pos=lay[t.id]||{left:0,width:100};
        var top=t.s/60*HOUR_H, hh=Math.max(20,(t.e-t.s)/60*HOUR_H-2);
        var label=esc(t.ev.title)+(n===1?' <span style="opacity:.85;font-weight:400">'+t.ev.start+'</span>':'');
        h+='<div class="block" data-ev="'+t.ev.id+'" style="top:'+top+'px;height:'+hh+'px;left:calc('+pos.left+'% + 1px);width:calc('+pos.width+'% - 3px);background:'+t.ev.color+'"><b>'+label+'</b>'+(t.ev.location&&n===1?'<div style="font-size:10px;opacity:.85">'+esc(t.ev.location)+'</div>':'')+'</div>';
      });
      if(key===todayKey) h+='<div class="nowline" style="top:'+(nowMin/60*HOUR_H)+'px"><div class="nowdot"></div></div>';
      h+='</div>';
    });
    return h+'</div></div></div>';
  }

  root.addEventListener("click",function(e){
    var t=e.target.closest("[data-act],[data-day],[data-month],[data-ev],[data-view],[data-colday]");
    if(!t) return;
    if(t.hasAttribute("data-view")){ state.view=t.getAttribute("data-view"); state.selecting=false; state.selDays={}; if(state.view==="month")state._mscroll=true; render(); return; }
    if(t.hasAttribute("data-ev")){ openEventDetail(t.getAttribute("data-ev")); return; }
    if(t.hasAttribute("data-month")){ var mm=+t.getAttribute("data-month"); state.cursor=new Date(state.cursor.getFullYear(),mm,1); state.view="month"; state._mscroll=true; render(); return; }
    if(t.hasAttribute("data-day")){ var k=t.getAttribute("data-day"); if(t.classList.contains("empty"))return; if(state.selecting){ toggleSel(k,t); } else { state.cursor=fromKey(k); state.view="day"; render(); } return; }
    if(t.hasAttribute("data-colday") && !e.target.closest("[data-ev]")){ var key=t.getAttribute("data-colday"); var rect=t.getBoundingClientRect(); var y=e.clientY-rect.top; var hour=clamp(Math.floor(y/HOUR_H),0,23); openEventForm(key,null,pad(hour)+":00"); return; }
    var act=t.getAttribute("data-act");
    if(act==="prev") step(-1);
    else if(act==="next") step(1);
    else if(act==="today"){ if(state.view==="month"){ state.cursor=new Date(); updateTitle(); scrollToMonth(state.cursor,true); } else { state.cursor=new Date(); render(); } }
    else if(act==="work") openWork();

    else if(act==="add") openEventForm(toKey(state.cursor),null,null);
    else if(act==="select"){ state.selecting=true; state.selDays={}; render(); }
    else if(act==="cancelSel"){ state.selecting=false; state.selDays={}; render(); }
    else if(act==="clearSel"){ state.selDays={}; render(); }
    else if(act==="setSelShift"){ if(selCount()) openMultiAssign(); }
  });

  function toggleSel(key,el){
    if(state.selDays[key]){ delete state.selDays[key]; if(el)el.classList.remove("sel"); }
    else { state.selDays[key]=true; if(el)el.classList.add("sel"); }

    var sb=document.querySelector('[data-act="setSelShift"]'); if(sb) sb.style.opacity=n?1:.4;

  function step(dir){
    var c=state.cursor;
    if(state.view==="month"){ state.cursor=new Date(c.getFullYear(),c.getMonth()+dir,1); updateTitle(); scrollToMonth(state.cursor,true); return; }
    if(state.view==="year") state.cursor=new Date(c.getFullYear()+dir,c.getMonth(),1);
    else if(state.view==="week") state.cursor=addDays(c,7*dir);
    else state.cursor=addDays(c,dir);
    render();
  }
  function setLevel(delta){ var i=LEVELS.indexOf(state.view); var j=clamp(i+delta,0,3); if(j!==i){ state.view=LEVELS[j]; state.selecting=false; state.selDays={}; if(state.view==="month")state._mscroll=true; render(); } }

  if(!state._g){
    state._g=true; var startDist=0;
    function dist(t){ var dx=t[0].clientX-t[1].clientX, dy=t[0].clientY-t[1].clientY; return Math.hypot(dx,dy); }
    document.addEventListener("touchstart",function(e){ if(e.touches.length===2&&!document.getElementById("ov")) startDist=dist(e.touches); },{passive:true});
    document.addEventListener("touchmove",function(e){ if(e.touches.length===2&&!document.getElementById("ov")&&startDist){ e.preventDefault(); var d=dist(e.touches), r=d/startDist; if(r>1.28){ setLevel(1); startDist=d; } else if(r<0.78){ setLevel(-1); startDist=d; } } },{passive:false});
    document.addEventListener("touchend",function(){ startDist=0; });
    var lastWheel=0;
    window.addEventListener("wheel",function(e){ if((e.ctrlKey||e.metaKey)&&!document.getElementById("ov")){ e.preventDefault(); var nw=Date.now(); if(nw-lastWheel<260) return; lastWheel=nw; setLevel(e.deltaY<0?1:-1); } },{passive:false});
  }

  function shiftListHTML(){ return state.shiftTypes.map(function(s){ return '<button class="row" data-s="'+s.id+'"><div style="width:12px;height:12px;border-radius:50%;background:'+s.color+'"></div>'+esc(s.name)+(s.start?'<span style="color:var(--muted);font-size:13px;margin-left:auto">'+s.start+'–'+s.end+'</span>':'')+'</button>'; }).join(""); }

      wShifts.forEach(function(s){ inner+='<button class="addchip" data-add="'+s.id+'" style="border:1.5px solid '+s.color+';color:'+s.color+'">+ '+esc(s.name)+'</button>'; });
      inner+='</div><div class="label">CYCLE STARTS ON</div><input type="date" id="startDate" value="'+wStart+'"><button class="btn primary" id="saveWork" style="margin-top:18px">Save Work Schedule</button>';
      var body=sheet("Work Calendar",inner);
      body.querySelector("#addType").onclick=function(){ sync(body); var nm=body.querySelector("#newName").value.trim(); if(!nm)return; var used=wShifts.map(function(s){return s.color;}); var pick=PALETTE.filter(function(p){return used.indexOf(p[1])<0;})[0]||PALETTE[0]; wShifts.push({id:uid(),name:nm,color:pick[1],start:"09:00",end:"17:00",location:""}); build(); };
      body.querySelectorAll("[data-add]").forEach(function(b){ b.onclick=function(){ sync(body); wSeq.push(b.getAttribute("data-add")); build(); }; });
      var cs=body.querySelector("#clearSeq"); if(cs) cs.onclick=function(){ sync(body); wSeq=[]; build(); };
      body.querySelector("#saveWork").onclick=function(){ sync(body); state.shiftTypes=wShifts; state.rotation=wSeq.length?{startDate:wStart,sequence:wSeq}:null; persist(); closeModal(); render(); };
    }
    build();
  }

  render();
})();
</script>
</body>
</html>
